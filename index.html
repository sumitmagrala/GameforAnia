<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive Link</title>
    <!-- Include Tailwind CSS for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans antialiased text-gray-900">

    <div class="text-center p-8 bg-white rounded-2xl shadow-xl max-w-sm w-full mx-4 border border-gray-100">
        <!-- Optional Icon for visual appeal -->
        <svg class="w-16 h-16 mx-auto mb-4 text-blue-500" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.14 13.04l-3.32-5.74c-.2-.35-.58-.56-.98-.56H8.2c-.4 0-.78.21-.98.56L3.9 13.04c-.2.35-.2.77 0 1.12l3.32 5.74c.2.35.58.56.98.56h6.64c.4 0 .78-.21.98-.56l3.32-5.74c.2-.35.2-.77 0-1.12zm-4.3-1.12H9.16l-1.66-2.87h6.64l-1.66 2.87zm-7.62-.57l1.66-2.87 3.32 5.74-1.66 2.87-3.32-5.74zm9.28 2.87l-1.66 2.87-3.32-5.74 1.66-2.87 3.32 5.74z"/>
        </svg>

        <h1 class="text-2xl font-bold mb-2">Access Files</h1>
        <p class="text-gray-500 mb-6 text-sm">Click the button below to view the shared Google Drive folder.</p>

        <!-- The Button linking to your Google Drive folder -->
        <a 
            href="https://drive.google.com/drive/folders/1atqzjr_R7XWodRKMShFOsJas8Ijcck3s?usp=drive_link" 
            target="_blank" 
            rel="noopener noreferrer"
            class="inline-block w-full px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition duration-200 ease-in-out transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50"
        >
            Open Drive Folder
        </a>
    </div>

</body>
</html>
