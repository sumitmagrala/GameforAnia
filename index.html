<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Ania 🥺</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overflow: hidden; /* Prevent scrolling when Yes button gets huge */
            touch-action: manipulation; /* Improve mobile tap behavior */
        }
        
        .title-font {
            font-family: 'Pacifico', cursive;
        }

        /* Cute bounce animation */
        @keyframes gentle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-gentle {
            animation: gentle-bounce 2s ease-in-out infinite;
        }

        /* Fade in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* Floating Hearts Animation */
        .heart {
            position: absolute;
            font-size: 2rem;
            animation: floatUp 4s ease-in forwards;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* Smooth transitions for buttons */
        #btn-yes, #btn-no {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-100 to-purple-200">

    <!-- Step 1: Apology Sequence -->
    <div id="step-1" class="text-center w-full max-w-md px-6 fade-in flex flex-col items-center">
        <div class="text-6xl mb-6 animate-bounce-gentle" id="emoji-display">🥺</div>
        
        <div class="bg-white/60 backdrop-blur-md p-8 rounded-3xl shadow-xl w-full border border-white/50">
            <h1 class="title-font text-3xl text-pink-500 mb-4">Dear Ania,</h1>
            <p id="apology-text" class="text-lg text-gray-700 font-semibold mb-8 min-h-[4rem] flex items-center justify-center">
                I wanted to talk to you...
            </p>
            
            <button id="next-btn" onclick="nextMessage()" class="bg-pink-400 hover:bg-pink-500 text-white text-lg font-bold py-3 px-8 rounded-full shadow-lg transform active:scale-95 transition-all w-full">
                Continue 🤍
            </button>
        </div>
    </div>

    <!-- Step 2: The Question -->
    <div id="step-2" class="hidden text-center w-full px-4 h-screen flex-col items-center justify-center fixed inset-0">
        <h2 class="title-font text-4xl md:text-5xl text-pink-600 mb-8 z-10 drop-shadow-sm px-4">
            Will you forgive me, Ania?
        </h2>
        
        <div class="flex flex-col md:flex-row items-center justify-center gap-6 w-full max-w-lg z-10 mt-8">
            <button id="btn-yes" onclick="forgiveMe()" class="bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold py-4 px-10 rounded-full shadow-xl shadow-green-200 whitespace-nowrap" style="font-size: 1.25rem;">
                Yes, I forgive you! ❤️
            </button>
            
            <button id="btn-no" onclick="handleNoClick()" class="bg-gray-400 text-white font-bold py-3 px-8 rounded-full shadow-md whitespace-nowrap" style="font-size: 1rem;">
                No 💔
            </button>
        </div>
    </div>

    <!-- Step 3: Success / Forgiven -->
    <div id="step-3" class="hidden text-center w-full max-w-md px-6 z-10">
        <div class="text-8xl mb-6 animate-bounce-gentle">🥰</div>
        <h1 class="title-font text-5xl text-pink-500 mb-4 drop-shadow-md">Thank You!</h1>
        <p class="text-xl text-gray-700 font-semibold bg-white/70 p-6 rounded-2xl shadow-lg border border-white/50">
            You are the best, Ania. I promise to make it up to you! ❤️
        </p>
    </div>

    <script>
        // --- State ---
        const messages = [
            "I wanted to talk to you...",
            "I know I messed up, and I'm really sorry.",
            "I value our relationship more than words can say.",
            "I hate seeing you upset, especially because of me.",
            "I promise to do better and be better for you.",
            "So, I have to ask..."
        ];
        
        const noButtonTexts = [
            "No 💔",
            "Are you sure? 🥺",
            "Please Ania... 😭",
            "Think about it! 🥹",
            "Give me a chance! 🩹",
            "Don't do this! 💔",
            "I'm really sorry! 🧸",
            "You're breaking my heart 🥀",
            "I'll buy you food! 🍕",
            "Okay, the 'Yes' button is right there 👉",
        ];

        let currentMsgIndex = 0;
        let noClickCount = 0;
        let yesButtonSize = 1.25; // in rem

        // --- DOM Elements ---
        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');
        const step3 = document.getElementById('step-3');
        const apologyText = document.getElementById('apology-text');
        const emojiDisplay = document.getElementById('emoji-display');
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');

        // --- Functions ---
        
        // Progress through the apology text
        function nextMessage() {
            currentMsgIndex++;
            if (currentMsgIndex < messages.length) {
                // Fade out text
                apologyText.style.opacity = 0;
                setTimeout(() => {
                    apologyText.innerText = messages[currentMsgIndex];
                    // Change emoji based on progress
                    if(currentMsgIndex === 1) emojiDisplay.innerText = "😔";
                    if(currentMsgIndex === 3) emojiDisplay.innerText = "😞";
                    if(currentMsgIndex === 4) emojiDisplay.innerText = "🤞";
                    if(currentMsgIndex === 5) emojiDisplay.innerText = "🙏";
                    
                    // Fade text back in
                    apologyText.style.opacity = 1;
                }, 200);
            } else {
                // Transition to the Question
                step1.classList.add('hidden');
                step2.classList.remove('hidden');
                step2.classList.add('flex', 'fade-in');
            }
        }

        // Logic for when she clicks "No"
        function handleNoClick() {
            noClickCount++;
            
            // Change the text of the No button
            const nextTextIndex = Math.min(noClickCount, noButtonTexts.length - 1);
            btnNo.innerText = noButtonTexts[nextTextIndex];
            
            // Increase the Yes button size dramatically
            yesButtonSize += 0.8;
            btnYes.style.fontSize = `${yesButtonSize}rem`;
            btnYes.style.padding = `${yesButtonSize * 0.8}rem ${yesButtonSize * 1.5}rem`;
            
            // Make the No button slightly smaller/transparent
            const noScale = Math.max(0.5, 1 - (noClickCount * 0.05));
            btnNo.style.transform = `scale(${noScale})`;
        }

        // Logic for when she finally clicks "Yes"
        function forgiveMe() {
            step2.classList.remove('flex');
            step2.classList.add('hidden');
            
            step3.classList.remove('hidden');
            step3.classList.add('fade-in');
            
            // Trigger confetti / hearts
            startHeartShower();
        }

        // Generates floating emojis for the celebration
        function startHeartShower() {
            const emojis = ['❤️', '💖', '✨', '🌸', '🥰'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                // Random horizontal start position
                heart.style.left = Math.random() * 100 + 'vw';
                
                // Random animation duration between 3s and 6s
                const duration = Math.random() * 3 + 3;
                heart.style.animationDuration = duration + 's';
                
                // Random size
                heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                
                document.body.appendChild(heart);
                
                // Clean up element after animation
                setTimeout(() => {
                    heart.remove();
                }, duration * 1000);
                
            }, 150); // Create a new heart every 150ms
        }
    </script>
</body>
</html>
